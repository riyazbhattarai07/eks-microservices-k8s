---
apiVersion: v1
kind: Namespace
metadata:
  name: microservices

---
# Service Account for applications
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: microservices

---
# ClusterRole for pod monitoring/observability
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: app-monitoring-role
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: app-monitoring-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: app-monitoring-role
subjects:
- kind: ServiceAccount
  name: app-sa
  namespace: microservices
